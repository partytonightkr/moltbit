# Fly.io config ‚Äî `fly launch --no-deploy` (uses the Dockerfile), then `fly deploy`.
# Change `app` to your own unique name. Scales to zero so it stays ~free.
app = "moltbit"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# Set secrets (not in this file):
#   fly secrets set UPSTASH_REDIS_REST_URL=... UPSTASH_REDIS_REST_TOKEN=... \
#                   AGENT_SECRET=... CRON_SECRET=...

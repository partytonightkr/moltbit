<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Moltbit — Operator Kill Switch</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; background: #0b0e13; color: #e6edf3; }
  header { padding: 18px 22px; border-bottom: 1px solid #1c232e; display: flex; align-items: center; gap: 10px; }
  header b { font-size: 16px; } header .ic { font-size: 20px; }
  main { max-width: 760px; margin: 0 auto; padding: 22px; }
  .card { background: #11161d; border: 1px solid #1c232e; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  input { background: #0b0e13; border: 1px solid #283142; color: #e6edf3; border-radius: 7px; padding: 9px 11px; font: inherit; }
  button { background: #e5484d; color: #fff; border: 0; border-radius: 7px; padding: 9px 14px; font: inherit; font-weight: 700; cursor: pointer; }
  button.secondary { background: #283142; color: #e6edf3; font-weight: 600; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .agent { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-top: 1px solid #1c232e; gap: 12px; }
  .agent:first-child { border-top: 0; }
  .meta small { color: #8b97a7; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid #283142; color: #8b97a7; }
  .pill.live { color: #3fb950; border-color: #1f3d27; }
  .pill.halted, .pill.paused { color: #e5484d; border-color: #3d1f22; }
  pre { background: #0b0e13; border: 1px solid #1c232e; border-radius: 8px; padding: 12px; overflow: auto; white-space: pre-wrap; }
  .muted { color: #8b97a7; } .err { color: #e5484d; } .ok { color: #3fb950; }
</style>
</head>
<body>
<header><span class="ic">⏻</span><b>Moltbit Operator — Kill Switch</b><span class="pill">restricted</span></header>
<main>
  <div class="card" id="loginCard">
    <div style="margin-bottom:10px" class="muted">Operator sign-in (uses <code>OPERATOR_PASSWORD</code>).</div>
    <div style="display:flex; gap:8px">
      <input id="pw" type="password" placeholder="operator password" style="flex:1" />
      <button id="loginBtn" class="secondary">Sign in</button>
    </div>
    <div id="loginMsg" class="err" style="margin-top:8px"></div>
  </div>

  <div class="card" id="agentsCard" hidden>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px">
      <b>Agents</b>
      <div style="display:flex; gap:8px">
        <button id="refreshBtn" class="secondary">Refresh</button>
        <button id="pauseAllBtn">PAUSE ALL</button>
      </div>
    </div>
    <div class="muted" style="margin-bottom:8px">Halting an agent stops its orders at the gateway, pauses its vault on-chain, and flattens positions. Exits stay open.</div>
    <div id="agents"></div>
  </div>

  <div class="card" id="resultCard" hidden>
    <b>Last action</b>
    <pre id="result"></pre>
  </div>
</main>
<script>
const $ = (id) => document.getElementById(id);
let token = sessionStorage.getItem("moltbit_ops_token") || null;

async function api(path, opts = {}) {
  const headers = { "content-type": "application/json", ...(opts.headers || {}) };
  if (token) headers.authorization = "Bearer " + token;
  const r = await fetch(path, { ...opts, headers });
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(body.error || (r.status + " " + path));
  return body;
}

async function login() {
  $("loginMsg").textContent = "";
  try {
    const { token: t } = await api("/api/login", { method: "POST", body: JSON.stringify({ password: $("pw").value }) });
    token = t; sessionStorage.setItem("moltbit_ops_token", t);
    showAgents();
  } catch (e) { $("loginMsg").textContent = e.message; }
}

function pillEl(status) {
  const s = (status || "review").toLowerCase();
  const el = document.createElement("span");
  el.className = "pill " + s;
  el.textContent = s;
  return el;
}

async function showAgents() {
  $("loginCard").hidden = true;
  $("agentsCard").hidden = false;
  const { agents } = await api("/api/agents");
  $("agents").textContent = "";
  (agents || []).forEach((a) => {
    const row = document.createElement("div");
    row.className = "agent";
    const halted = a.status === "halted" || a.status === "paused";

    // Build with textContent — never innerHTML — so agent name/id can't inject HTML.
    const meta = document.createElement("div");
    meta.className = "meta";
    const title = document.createElement("div");
    const name = document.createElement("b");
    name.textContent = a.name || a.id;
    title.appendChild(name);
    title.appendChild(document.createTextNode(" "));
    title.appendChild(pillEl(a.status));
    const sub = document.createElement("small");
    sub.textContent = a.id + " · " + (a.env || "test") + " · AUM $" + (a.aum || 0) + "M · deployed $" + (a.deployed || 0);
    meta.appendChild(title);
    meta.appendChild(sub);

    const controls = document.createElement("div");
    controls.style.display = "flex";
    controls.style.gap = "8px";

    // GRADUATE — only offered for certified agents that aren't live yet
    if (a.certified && a.status !== "live") {
      const grad = document.createElement("button");
      grad.className = "secondary";
      grad.textContent = "GRADUATE";
      grad.onclick = () => graduate(a.id, a.name || a.id);
      controls.appendChild(grad);
    }

    const btn = document.createElement("button");
    btn.textContent = halted ? "Halted" : "HALT";
    btn.disabled = halted;
    btn.onclick = () => kill(a.id, a.name || a.id);
    controls.appendChild(btn);

    row.appendChild(meta);
    row.appendChild(controls);
    $("agents").appendChild(row);
  });
}

async function graduate(agentId, name) {
  const vaultAddress = prompt('Graduate "' + name + '" to LIVE.\n\nVault address (MoltbitVault):');
  if (!vaultAddress) return;
  const adapterAddress = prompt("Venue adapter address (optional — leave blank for HTTP venue):") || null;
  const serverWalletId = prompt("Privy server wallet id (optional):") || null;
  if (!confirm('Graduate "' + name + '" to real capital with vault ' + vaultAddress + "?")) return;
  try {
    const res = await api("/api/graduate", {
      method: "POST",
      body: JSON.stringify({ agentId, vaultAddress, adapterAddress, serverWalletId }),
    });
    $("resultCard").hidden = false;
    $("result").className = "";
    $("result").textContent =
      "GRADUATED — copy the new live key now (shown once):\n\n" + res.agentKey + "\n\n" + JSON.stringify(res.agent, null, 2);
    showAgents();
  } catch (e) {
    $("resultCard").hidden = false;
    $("result").className = "err";
    $("result").textContent = e.message;
  }
}

async function kill(agentId, name) {
  if (!confirm('Halt "' + name + '"? This stops trading, pauses the vault, and flattens positions.')) return;
  try {
    const res = await api("/api/kill", { method: "POST", body: JSON.stringify({ agentId, reason: "operator console" }) });
    $("resultCard").hidden = false;
    $("result").className = "";
    $("result").textContent = JSON.stringify(res, null, 2);
    showAgents();
  } catch (e) {
    $("resultCard").hidden = false;
    $("result").className = "err";
    $("result").textContent = e.message;
  }
}

async function pauseAll() {
  if (!confirm("GLOBAL PAUSE — halt every agent and pause every vault? Exits stay open.")) return;
  try {
    const res = await api("/api/pause-all", { method: "POST", body: JSON.stringify({ reason: "operator console — global pause" }) });
    $("resultCard").hidden = false;
    $("result").className = "";
    $("result").textContent = JSON.stringify(res, null, 2);
    showAgents();
  } catch (e) {
    $("resultCard").hidden = false;
    $("result").className = "err";
    $("result").textContent = e.message;
  }
}

$("loginBtn").onclick = login;
$("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
$("refreshBtn").onclick = showAgents;
$("pauseAllBtn").onclick = pauseAll;
if (token) showAgents().catch(() => { token = null; sessionStorage.removeItem("moltbit_ops_token"); $("loginCard").hidden = false; $("agentsCard").hidden = true; });
</script>
</body>
</html>
